<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>حاسبة العمر - أبوالقاسم معتصم الخير</title>
    <link href="https://fonts.googleapis.com/css2?family=Lateef:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --soft-gold: #c5a059; }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; /* تثبيت الشاشة تماماً */
            display: flex; justify-content: center; align-items: center;
            background: #2c3e50; /* لون هادئ ثابت */
            font-family: 'Lateef', serif;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px; border-radius: 30px;
            border: 1px solid rgba(197, 160, 89, 0.3);
            width: 90%; max-width: 380px; text-align: center; color: #ecf0f1;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .name { font-size: 2.2em; color: var(--soft-gold); margin-bottom: 5px; }
        .title { font-size: 1.4em; margin-bottom: 15px; color: #bdc3c7; }
        
        .inputs { display: flex; gap: 8px; justify-content: center; margin-bottom: 15px; }
        input { width: 70px; padding: 10px; border-radius: 10px; border: 1px solid var(--soft-gold); background: rgba(0,0,0,0.2); color: white; text-align: center; font-size: 16px; }
        
        button { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--soft-gold); color: #fff; font-weight: bold; font-size: 18px; cursor: pointer; }
        
        .res-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 20px; }
        .box { background: rgba(197, 160, 89, 0.1); padding: 8px; border-radius: 10px; border: 1px solid var(--soft-gold); }
        .val { font-size: 1.4em; color: var(--soft-gold); display: block; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <div class="name">أبوالقاسم معتصم الخير</div>
        <div class="title">حاسبة العمر الدقيقة</div>
        <div class="inputs">
            <input type="number" id="day" placeholder="يوم">
            <input type="number" id="month" placeholder="شهر">
            <input type="number" id="year" placeholder="سنة">
        </div>
        <button onclick="calc()">احسب الآن</button>
        <div class="res-grid" id="res"></div>
    </div>
    <script>
        function calc() {
            const d = parseInt(document.getElementById('day').value);
            const m = parseInt(document.getElementById('month').value) - 1;
            const y = parseInt(document.getElementById('year').value);
            if(!d || !m || !y) return alert("الرجاء إدخال التاريخ كاملاً");
            
            const birth = new Date(y, m, d);
            const now = new Date();
            
            let years = now.getFullYear() - birth.getFullYear();
            let months = now.getMonth() - birth.getMonth();
            let days = now.getDate() - birth.getDate();
            if(days < 0){ months--; days += 30; }
            if(months < 0){ years--; months += 12; }
            
            document.getElementById('res').innerHTML = `
                <div class="box"><b class="val">${years}</b>سنة</div>
                <div class="box"><b class="val">${months}</b>شهر</div>
                <div class="box"><b class="val">${days}</b>يوم</div>
                <div class="box"><b class="val">${now.getHours()}</b>ساعة</div>
                <div class="box"><b class="val">${now.getMinutes()}</b>دقيقة</div>
                <div class="box"><b class="val">${now.getSeconds()}</b>ثانية</div>
            `;
        }
    </script>
</body>
</html>
