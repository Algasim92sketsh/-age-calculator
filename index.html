<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة العمر - تطوير أبو القاسم</title>
    <style>
        /* خلفية سينمائية متحركة */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 50% 50%, #1a2a6c, #b21f1f, #fdbb2d);
            background-size: 400% 400%;
            animation: moveGradient 15s ease infinite;
            font-family: 'Cairo', sans-serif;
        }
        @keyframes moveGradient {
            0% {background-position: 0% 50%}
            50% {background-position: 100% 50%}
            100% {background-position: 0% 50%}
        }
        /* كارت الـ 3D */
        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.2);
            width: 90%;
            max-width: 450px;
            text-align: center;
            color: white;
        }
        .dev-name { font-size: 1.2em; margin-bottom: 20px; font-weight: bold; color: #ffd700; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
        input { width: 25%; padding: 15px; border-radius: 20px; border: none; text-align: center; margin: 5px; font-size: 18px; background: rgba(255,255,255,0.9); }
        button { width: 85%; padding: 15px; border-radius: 20px; border: none; background: #ff416c; color: white; font-size: 20px; margin-top: 20px; cursor: pointer; transition: 0.4s; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        button:hover { transform: translateY(-5px); background: #ff4b2b; }
        .result-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .data-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div class="glass-card">
        <div class="dev-name">تطوير: أبو القاسم</div>
        <h3>حاسبة العمر الدقيقة</h3>
        <input type="number" id="day" placeholder="يوم">
        <input type="number" id="month" placeholder="شهر">
        <input type="number" id="year" placeholder="سنة">
        <button onclick="calc()">احسب الآن</button>
        <div class="result-container" id="res"></div>
    </div>
    <script>
        function calc() {
            const d = parseInt(document.getElementById('day').value);
            const m = parseInt(document.getElementById('month').value) - 1;
            const y = parseInt(document.getElementById('year').value);
            const birth = new Date(y, m, d);
            const now = new Date();
            let years = now.getFullYear() - birth.getFullYear();
            let months = now.getMonth() - birth.getMonth();
            let days = now.getDate() - birth.getDate();
            if(days < 0){ months--; days += 30; }
            if(months < 0){ years--; months += 12; }
            const diff = now - birth;
            const sec = Math.floor((diff / 1000) % 60);
            document.getElementById('res').innerHTML = `
                <div class="data-box"><b>${years}</b><br>سنة</div>
                <div class="data-box"><b>${months}</b><br>شهر</div>
                <div class="data-box"><b>${days}</b><br>يوم</div>
                <div class="data-box"><b>${sec}</b><br>ثانية</div>
            `;
        }
    </script>
</body>
</html>
