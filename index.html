<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة العمر - أبوالقاسم معتصم الخير</title>
    <link href="https://fonts.googleapis.com/css2?family=Lateef:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; }
        body {
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #1b2735, #090a0f);
            background-size: 400% 400%;
            animation: moveGradient 10s ease infinite;
            font-family: 'Lateef', serif;
        }
        @keyframes moveGradient {
            0% {background-position: 0% 50%} 50% {background-position: 100% 50%} 100% {background-position: 0% 50%}
        }
        .card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            padding: 30px; border-radius: 35px; border: 1px solid rgba(255, 215, 0, 0.3);
            width: 90%; max-width: 400px; text-align: center; color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .name { font-size: 2.5em; color: var(--gold); margin-bottom: 5px; text-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
        .title { font-size: 1.5em; margin-bottom: 25px; border-bottom: 1px solid var(--gold); padding-bottom: 10px; }
        
        .inputs { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        input { width: 80px; padding: 12px; border-radius: 15px; border: 1px solid var(--gold); background: rgba(0,0,0,0.3); color: white; text-align: center; font-size: 18px; }
        
        button { width: 100%; padding: 15px; border-radius: 15px; border: none; background: var(--gold); color: black; font-weight: bold; font-size: 20px; cursor: pointer; transition: 0.3s; }
        button:hover { transform: scale(1.02); background: white; }
        
        .res-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 25px; }
        .box { background: rgba(255, 215, 0, 0.1); padding: 10px; border-radius: 12px; border: 1px solid var(--gold); }
        .val { font-size: 1.8em; color: var(--gold); display: block; }
    </style>
</head>
<body>
    <div class="card">
        <div class="name">أبوالقاسم معتصم الخير</div>
        <div class="title">حاسبة العمر الدقيقة</div>
        <div class="inputs">
            <input type="number" id="day" placeholder="يوم">
            <input type="number" id="month" placeholder="شهر">
            <input type="number" id="year" placeholder="سنة">
        </div>
        <button onclick="calc()">احسب الآن</button>
        <div class="res-grid" id="res"></div>
    </div>
    <script>
        function calc() {
            const d = parseInt(document.getElementById('day').value);
            const m = parseInt(document.getElementById('month').value) - 1;
            const y = parseInt(document.getElementById('year').value);
            if(!d || !m || !y) return alert("الرجاء إدخال التاريخ كاملاً");
            
            const birth = new Date(y, m, d);
            const now = new Date();
            
            let years = now.getFullYear() - birth.getFullYear();
            let months = now.getMonth() - birth.getMonth();
            let days = now.getDate() - birth.getDate();
            if(days < 0){ months--; days += 30; }
            if(months < 0){ years--; months += 12; }
            
            // حساب الساعة والدقيقة والثانية الحالية (لحظية)
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();
            
            document.getElementById('res').innerHTML = `
                <div class="box"><b class="val">${years}</b>سنة</div>
                <div class="box"><b class="val">${months}</b>شهر</div>
                <div class="box"><b class="val">${days}</b>يوم</div>
                <div class="box"><b class="val">${hours}</b>ساعة</div>
                <div class="box"><b class="val">${minutes}</b>دقيقة</div>
                <div class="box"><b class="val">${seconds}</b>ثانية</div>
            `;
        }
    </script>
</body>
</html>
