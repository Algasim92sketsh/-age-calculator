<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>حاسبة العمر - أبوالقاسم معتصم الخير</title>
    <link href="https://fonts.googleapis.com/css2?family=Lateef:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(-45deg, #1a2a6c, #b21f1f, #fdbb2d, #1a2a6c);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Lateef', serif;
        }
        @keyframes gradientBG {
            0% {background-position: 0% 50%} 50% {background-position: 100% 50%} 100% {background-position: 0% 50%}
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(20px);
            padding: 30px; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.2); width: 90%; max-width: 400px; 
            text-align: center; color: white;
        }
        .dev-name { 
            font-size: 2.2em; font-weight: bold; color: #FFD700;
            text-shadow: 2px 2px 0px #8B4513, 0 0 10px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }
        h3 { font-size: 1.8em; margin-bottom: 20px; }
        
        /* تصميم حقول الإدخال كما في الصورة */
        .input-group { display: flex; flex-direction: column; gap: 10px; align-items: center; }
        input { width: 85%; padding: 15px; border-radius: 20px; border: none; text-align: center; font-size: 18px; background: rgba(255,255,255,0.9); }
        
        button { width: 90%; padding: 15px; border-radius: 20px; border: none; background: #ff416c; color: white; font-size: 22px; margin-top: 15px; cursor: pointer; font-family: 'Lateef', serif; }
        button:hover { background: #ff4b2b; }
        
        .result-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .data-box { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        b { font-size: 1.5em; color: #FFD700; display: block; }
    </style>
</head>
<body>
    <div class="glass-card">
        <div class="dev-name">تطوير: أبوالقاسم معتصم الخير</div>
        <h3>حاسبة العمر الدقيقة</h3>
        <div class="input-group">
            <input type="number" id="day" placeholder="اليوم">
            <input type="number" id="month" placeholder="الشهر">
            <input type="number" id="year" placeholder="السنة">
        </div>
        <button onclick="calc()">احسب الآن</button>
        <div class="result-container" id="res"></div>
    </div>
    <script>
        function calc() {
            const d = parseInt(document.getElementById('day').value);
            const m = parseInt(document.getElementById('month').value) - 1;
            const y = parseInt(document.getElementById('year').value);
            if(!d || !m || !y) return alert("الرجاء إدخال التاريخ كاملاً");
            const birth = new Date(y, m, d);
            const now = new Date();
            let years = now.getFullYear() - birth.getFullYear();
            let months = now.getMonth() - birth.getMonth();
            let days = now.getDate() - birth.getDate();
            if(days < 0){ months--; days += 30; }
            if(months < 0){ years--; months += 12; }
            const currentMinutes = now.getMinutes();
            const currentSeconds = now.getSeconds();
            document.getElementById('res').innerHTML = `
                <div class="data-box"><b>${years}</b>سنة</div>
                <div class="data-box"><b>${months}</b>شهر</div>
                <div class="data-box"><b>${days}</b>يوم</div>
                <div class="data-box"><b>${currentMinutes}</b>دقيقة</div>
                <div class="data-box"><b>${currentSeconds}</b>ثانية</div>
            `;
        }
    </script>
</body>
</html>
