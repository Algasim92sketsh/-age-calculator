<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>حاسبة العمر - أبوالقاسم معتصم الخير</title>
    <link href="https://fonts.googleapis.com/css2?family=Lateef:wght@700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            /* خلفية متحركة بألوان هادئة */
            background: linear-gradient(135deg, #2c3e50, #4a6572, #2c3e50);
            background-size: 300% 300%;
            animation: moveBG 10s ease infinite;
            font-family: 'Lateef', serif;
            overflow: hidden;
        }
        @keyframes moveBG {
            0% {background-position: 0% 50%} 50% {background-position: 100% 50%} 100% {background-position: 0% 50%}
        }
        .main-card {
            width: 90%; max-width: 400px; text-align: center; color: #fff;
        }
        .dev-name { font-size: 2.5em; color: #FFD700; margin-bottom: 10px; border-bottom: 2px solid #FFD700; padding-bottom: 10px; }
        .calc-title { font-size: 1.5em; margin-bottom: 20px; }
        input { width: 90%; padding: 15px; margin: 8px 0; border-radius: 10px; border: 1px solid #FFD700; background: rgba(0,0,0,0.3); color: white; text-align: center; font-size: 18px; }
        button { width: 95%; padding: 15px; border-radius: 10px; border: none; background: #FFD700; color: #000; font-weight: bold; font-size: 20px; margin-top: 10px; cursor: pointer; }
        
        /* تنسيق المربعات كما في الصورة */
        .grid-res { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .box { background: rgba(255,255,255,0.1); border: 1px solid #FFD700; padding: 15px; border-radius: 10px; }
        .val { font-size: 2em; color: #FFD700; display: block; }
    </style>
</head>
<body>
    <div class="main-card">
        <div class="dev-name">أبوالقاسم معتصم الخير</div>
        <div class="calc-title">حاسبة العمر الدقيقة</div>
        
        <input type="number" id="day" placeholder="اليوم">
        <input type="number" id="month" placeholder="الشهر">
        <input type="number" id="year" placeholder="السنة">
        <button onclick="calc()">احسب الآن</button>
        
        <div class="grid-res" id="res"></div>
    </div>

    <script>
        function calc() {
            const d = parseInt(document.getElementById('day').value);
            const m = parseInt(document.getElementById('month').value) - 1;
            const y = parseInt(document.getElementById('year').value);
            if(!d || !m || !y) return alert("الرجاء إدخال التاريخ كاملاً");
            
            const birth = new Date(y, m, d);
            const now = new Date();
            
            let years = now.getFullYear() - birth.getFullYear();
            let months = now.getMonth() - birth.getMonth();
            let days = now.getDate() - birth.getDate();
            if(days < 0){ months--; days += 30; }
            if(months < 0){ years--; months += 12; }
            
            // حساب لحظي للساعات والدقائق والثواني (0-59/23)
            const hrs = now.getHours();
            const mins = now.getMinutes();
            const secs = now.getSeconds();
            
            document.getElementById('res').innerHTML = `
                <div class="box"><b class="val">${years}</b>سنة</div>
                <div class="box"><b class="val">${months}</b>شهر</div>
                <div class="box"><b class="val">${days}</b>يوم</div>
                <div class="box"><b class="val">${hrs}</b>ساعة</div>
                <div class="box"><b class="val">${mins}</b>دقيقة</div>
                <div class="box"><b class="val">${secs}</b>ثانية</div>
            `;
        }
    </script>
</body>
</html>
