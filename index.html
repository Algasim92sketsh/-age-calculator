<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>حاسبة العمر - أبوالقاسم معتصم الخير</title>
    <link href="https://fonts.googleapis.com/css2?family=Lateef:wght@700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(135deg, #2c3e50, #34495e, #2c3e50);
            background-size: 200% 200%;
            animation: softMove 15s ease infinite;
            font-family: 'Lateef', serif;
            overflow: hidden; /* لمنع الحركة في الصفحة */
        }
        @keyframes softMove {
            0% {background-position: 0% 50%} 50% {background-position: 100% 50%} 100% {background-position: 0% 50%}
        }
        .main-wrapper {
            width: 92%; max-width: 400px;
            display: flex; flex-direction: column; align-items: center;
            padding: 10px;
        }
        .header { color: #FFD700; font-size: 2em; font-weight: bold; margin-bottom: 10px; text-align: center; }
        .subtitle { color: #bdc3c7; font-size: 1.3em; margin-bottom: 15px; }
        
        input { width: 90%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #FFD700; background: rgba(0,0,0,0.2); color: white; text-align: center; font-size: 18px; }
        button { width: 95%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #FFD700; color: #000; font-weight: bold; font-size: 20px; cursor: pointer; }
        
        .grid-results { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px; 
            width: 95%; margin-top: 10px;
        }
        .box { background: rgba(255,255,255,0.05); border: 1px solid #FFD700; padding: 8px; border-radius: 8px; text-align: center; color: white; }
        .val { font-size: 1.5em; color: #FFD700; display: block; font-weight: bold; }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="header">أبوالقاسم معتصم الخير</div>
        <div class="subtitle">حاسبة العمر الدقيقة</div>
        
        <input type="number" id="day" placeholder="اليوم">
        <input type="number" id="month" placeholder="الشهر">
        <input type="number" id="year" placeholder="السنة">
        <button onclick="calc()">احسب الآن</button>
        
        <div class="grid-results" id="res"></div>
    </div>

    <script>
        function calc() {
            const d = parseInt(document.getElementById('day').value);
            const m = parseInt(document.getElementById('month').value) - 1;
            const y = parseInt(document.getElementById('year').value);
            if(!d || !m || !y) return alert("الرجاء إدخال التاريخ كاملاً");
            
            const birth = new Date(y, m, d);
            const now = new Date();
            
            let years = now.getFullYear() - birth.getFullYear();
            let months = now.getMonth() - birth.getMonth();
            let days = now.getDate() - birth.getDate();
            if(days < 0){ months--; days += 30; }
            if(months < 0){ years--; months += 12; }
            
            // حساب لحظي
            const hrs = now.getHours();
            const mins = now.getMinutes();
            const secs = now.getSeconds();
            
            document.getElementById('res').innerHTML = `
                <div class="box"><b class="val">${years}</b>سنة</div>
                <div class="box"><b class="val">${months}</b>شهر</div>
                <div class="box"><b class="val">${days}</b>يوم</div>
                <div class="box"><b class="val">${hrs}</b>ساعة</div>
                <div class="box"><b class="val">${mins}</b>دقيقة</div>
                <div class="box"><b class="val">${secs}</b>ثانية</div>
            `;
        }
    </script>
</body>
</html>
